<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Poster Generator</title>

<script src="https://cdn.jsdelivr.net/npm/konva@9/konva.min.js"></script>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: white;
  }

  .container {
    padding: 15px;
    max-width: 500px;
    margin: auto;
  }

  .logo {
    width: 180px;
    display: block;
    margin: auto;
  }

  input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
  }

  button {
    background: #38bdf8;
    color: white;
    border: none;
  }

  button:disabled {
    background: #93c5fd;
  }

  #editor, #preview {
    display: none;
  }

  #canvasContainer {
    width: 100%;
    border: 2px solid #38bdf8;
    margin-top: 10px;
    touch-action: none;
  }

  .controls {
    margin-top: 10px;
  }

  .slider {
    width: 100%;
  }
</style>
</head>

<body>

<!-- UPLOAD SCREEN -->
<div id="uploadScreen" class="container">
  <img class="logo" src="event-logo.png" />
  <h3 style="text-align:center;">6th Uganda Pharmaceutical Symposium 2026</h3>

  <input type="text" id="nameInput" placeholder="Enter your name"/>
  <input type="file" id="imageUpload" accept="image/*"/>

  <button id="continueBtn" disabled>Continue</button>
</div>

<!-- EDITOR -->
<div id="editor" class="container">
  <div id="canvasContainer"></div>

  <div class="controls">
    <label>Zoom</label>
    <input type="range" id="zoom" min="0.5" max="3" step="0.01" value="1" class="slider"/>

    <label>Rotate</label>
    <input type="range" id="rotate" min="-45" max="45" value="0" class="slider"/>

    <button id="resetBtn">Reset</button>
    <button id="previewBtn">Preview</button>
  </div>
</div>

<!-- PREVIEW -->
<div id="preview" class="container">
  <h3>Preview</h3>
  <canvas id="finalCanvas"></canvas>

  <button id="downloadBtn">Download PNG</button>
  <button id="backBtn">Edit Again</button>
</div>

<script>
let stage, layer;
let userImageNode;
let uploadedImage;
let userName = "";

// UI
const uploadScreen = document.getElementById("uploadScreen");
const editor = document.getElementById("editor");
const preview = document.getElementById("preview");

const nameInput = document.getElementById("nameInput");
const imageUpload = document.getElementById("imageUpload");
const continueBtn = document.getElementById("continueBtn");

nameInput.oninput = check;
imageUpload.onchange = check;

function check() {
  continueBtn.disabled = !(nameInput.value && imageUpload.files.length);
}

continueBtn.onclick = () => {
  userName = nameInput.value;
  const file = imageUpload.files[0];

  const reader = new FileReader();
  reader.onload = e => {
    uploadedImage = e.target.result;
    startEditor();
  };
  reader.readAsDataURL(file);
};

// INIT EDITOR
function startEditor() {
  uploadScreen.style.display = "none";
  editor.style.display = "block";

  stage = new Konva.Stage({
    container: "canvasContainer",
    width: 1000,
    height: 1125
  });

  layer = new Konva.Layer();
  stage.add(layer);

  // LOAD USER IMAGE
  const img = new Image();
  img.onload = () => {
    userImageNode = new Konva.Image({
      image: img,
      x: 0,
      y: 0,
      draggable: true,
      width: stage.width(),
      height: stage.height()
    });

    layer.add(userImageNode);
    layer.draw();
  };
  img.src = uploadedImage;

  // TEMPLATE (CLIPPING MASK)
  const template = new Image();
  template.onload = () => {
    const templateNode = new Konva.Image({
      image: template,
      x: 0,
      y: 0,
      width: stage.width(),
      height: stage.height(),
      listening: false
    });

    layer.add(templateNode);

    // 🔥 IMPORTANT: clip image inside template bounds
    userImageNode.setAttrs({
      clipX: 0,
      clipY: 0,
      clipWidth: stage.width(),
      clipHeight: stage.height()
    });

    layer.draw();
  };

  template.src = "template.png";
}

// ZOOM
document.getElementById("zoom").oninput = function () {
  if (userImageNode) {
    userImageNode.scale({ x: this.value, y: this.value });
    layer.draw();
  }
};

// ROTATE
document.getElementById("rotate").oninput = function () {
  if (userImageNode) {
    userImageNode.rotation(this.value);
    layer.draw();
  }
};

// RESET
document.getElementById("resetBtn").onclick = function () {
  document.getElementById("zoom").value = 1;
  document.getElementById("rotate").value = 0;

  if (userImageNode) {
    userImageNode.scale({ x: 1, y: 1 });
    userImageNode.rotation(0);
    userImageNode.position({ x: 0, y: 0 });
    layer.draw();
  }
};

// PREVIEW
document.getElementById("previewBtn").onclick = function () {
  const dataURL = stage.toDataURL({ pixelRatio: 2 });

  editor.style.display = "none";
  preview.style.display = "block";

  const img = new Image();
  img.src = dataURL;
  img.style.width = "100%";

  preview.prepend(img);
};

// DOWNLOAD (HIGH RES)
document.getElementById("downloadBtn").onclick = function () {
  const uri = stage.toDataURL({
    width: 2000,
    height: 2250,
    pixelRatio: 2
  });

  const link = document.createElement("a");
  link.download = userName + "_UPS2026.png";
  link.href = uri;
  link.click();
};

// BACK
document.getElementById("backBtn").onclick = function () {
  preview.style.display = "none";
  editor.style.display = "block";
};
</script>

</body>
</html>
