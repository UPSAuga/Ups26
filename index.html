<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Poster Generator</title>

<script src="https://cdn.jsdelivr.net/npm/konva@9/konva.min.js"></script>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #ffffff;
  }

  .container {
    padding: 12px;
    max-width: 500px;
    margin: auto;
  }

  .logo {
    width: 160px;
    display: block;
    margin: auto;
  }

  input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
  }

  button {
    background: #38bdf8;
    color: white;
    border: none;
    font-weight: bold;
  }

  button:disabled {
    background: #93c5fd;
  }

  #editor, #preview {
    display: none;
  }

  /* 🔥 MOBILE RESPONSIVE CANVAS HOLDER */
  #canvasContainer {
    width: 100%;
    height: auto;
    border: 2px solid #38bdf8;
    margin-top: 10px;
    touch-action: none;
    background: #f8fafc;
  }

  .controls {
    margin-top: 10px;
  }

  .slider {
    width: 100%;
  }

  h3 {
    text-align: center;
    color: #0284c7;
  }
</style>
</head>

<body>

<!-- UPLOAD -->
<div id="uploadScreen" class="container">
  <img class="logo" src="event-logo.png" />
  <h3>6th Uganda Pharmaceutical Symposium 2026</h3>

  <input type="text" id="nameInput" placeholder="Enter your name"/>
  <input type="file" id="imageUpload" accept="image/*"/>

  <button id="continueBtn" disabled>Continue</button>
</div>

<!-- EDITOR -->
<div id="editor" class="container">
  <div id="canvasContainer"></div>

  <div class="controls">
    <label>Zoom</label>
    <input type="range" id="zoom" min="0.5" max="3" step="0.01" value="1"/>

    <label>Rotate</label>
    <input type="range" id="rotate" min="-45" max="45" value="0"/>

    <button id="resetBtn">Reset</button>
    <button id="previewBtn">Preview</button>
  </div>
</div>

<!-- PREVIEW -->
<div id="preview" class="container">
  <h3>Preview</h3>
  <img id="finalImg" style="width:100%; border:2px solid #38bdf8;" />

  <button id="downloadBtn">Download PNG</button>
  <button id="backBtn">Edit Again</button>
</div>

<script>
let stage, layer;
let userImageNode, templateNode;
let uploadedImage;
let userName = "";

const uploadScreen = document.getElementById("uploadScreen");
const editor = document.getElementById("editor");
const preview = document.getElementById("preview");

const nameInput = document.getElementById("nameInput");
const imageUpload = document.getElementById("imageUpload");
const continueBtn = document.getElementById("continueBtn");

nameInput.oninput = check;
imageUpload.onchange = check;

function check() {
  continueBtn.disabled = !(nameInput.value && imageUpload.files.length);
}

continueBtn.onclick = () => {
  userName = nameInput.value;

  const reader = new FileReader();
  reader.onload = e => {
    uploadedImage = e.target.result;
    initEditor();
  };
  reader.readAsDataURL(imageUpload.files[0]);
};

/* =========================
   INIT EDITOR (MOBILE SAFE)
========================= */
function initEditor() {
  uploadScreen.style.display = "none";
  editor.style.display = "block";

  const EXPORT_W = 2000;
  const EXPORT_H = 2250;

  // 🔥 MOBILE SCALE (fit screen)
  const scale = Math.min(window.innerWidth / EXPORT_W, 0.4);

  stage = new Konva.Stage({
    container: "canvasContainer",
    width: EXPORT_W,
    height: EXPORT_H,
    scaleX: scale,
    scaleY: scale
  });

  layer = new Konva.Layer();
  stage.add(layer);

  /* USER IMAGE */
  const img = new Image();
  img.onload = () => {
    userImageNode = new Konva.Image({
      image: img,
      x: 0,
      y: 0,
      width: EXPORT_W,
      height: EXPORT_H,
      draggable: true
    });

    layer.add(userImageNode);
    layer.draw();
  };
  img.src = uploadedImage;

  /* TEMPLATE (IMPORTANT FIX) */
  const template = new Image();
  template.onload = () => {
    templateNode = new Konva.Image({
      image: template,
      x: 0,
      y: 0,
      width: EXPORT_W,
      height: EXPORT_H,
      listening: false
    });

    layer.add(templateNode);
    layer.moveToTop(); // ALWAYS ABOVE USER IMAGE
    layer.draw();
  };

  template.src = "template.png";
}

/* =========================
   CONTROLS
========================= */

// ZOOM
document.getElementById("zoom").oninput = function () {
  if (userImageNode) {
    userImageNode.scale({ x: this.value, y: this.value });
    layer.draw();
  }
};

// ROTATE
document.getElementById("rotate").oninput = function () {
  if (userImageNode) {
    userImageNode.rotation(this.value);
    layer.draw();
  }
};

// RESET
document.getElementById("resetBtn").onclick = function () {
  document.getElementById("zoom").value = 1;
  document.getElementById("rotate").value = 0;

  if (userImageNode) {
    userImageNode.scale({ x: 1, y: 1 });
    userImageNode.rotation(0);
    userImageNode.position({ x: 0, y: 0 });
    layer.draw();
  }
};

/* =========================
   PREVIEW
========================= */
document.getElementById("previewBtn").onclick = function () {
  const dataURL = stage.toDataURL({ pixelRatio: 2 });

  editor.style.display = "none";
  preview.style.display = "block";

  document.getElementById("finalImg").src = dataURL;
};

/* =========================
   DOWNLOAD (2000x2250)
========================= */
document.getElementById("downloadBtn").onclick = function () {
  const uri = stage.toDataURL({
    width: 2000,
    height: 2250,
    pixelRatio: 2
  });

  const link = document.createElement("a");
  link.download = userName + "_UPS2026.png";
  link.href = uri;
  link.click();
};

/* BACK */
document.getElementById("backBtn").onclick = function () {
  preview.style.display = "none";
  editor.style.display = "block";
};
</script>

</body>
</html>
