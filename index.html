<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Poster Generator</title>

<script src="https://cdn.jsdelivr.net/npm/konva@9/konva.min.js"></script>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #0f172a;
  }

  .header {
    text-align: center;
    padding: 15px;
  }

  .logo {
    width: 160px;
    height: 160px;
    margin: 10px auto;
    display: block;
    object-fit: contain;
  }

  .container {
    padding: 15px;
    max-width: 500px;
    margin: auto;
  }

  input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    font-size: 16px;
  }

  button {
    background: #38bdf8;
    color: white;
    border: none;
    font-weight: bold;
  }

  button:disabled {
    background: #93c5fd;
  }

  #editor, #previewScreen {
    display: none;
    padding: 10px;
  }

  #canvasContainer {
    border: 2px solid #38bdf8;
    margin-top: 10px;
    width: 100%;
    height: 500px;
    touch-action: none;
  }

  .controls {
    margin-top: 10px;
  }

  .slider {
    width: 100%;
  }

  .topTitle {
    text-align: center;
    font-weight: bold;
    color: #0284c7;
  }
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div id="uploadScreen" class="container">
  <div class="header">
    <img class="logo" src="https://via.placeholder.com/300x300.png?text=Event+Logo" />
    <h3>6th Uganda Pharmaceutical Symposium 2026</h3>
  </div>

  <input type="text" id="nameInput" placeholder="Enter your name" />
  <input type="file" id="imageUpload" accept="image/*" />

  <button id="continueBtn" disabled>Continue</button>
</div>

<!-- SCREEN 2 -->
<div id="editor">
  <div class="topTitle">Adjust Your Poster</div>

  <div id="canvasContainer"></div>

  <div class="controls">
    <label>Zoom</label>
    <input type="range" id="zoom" min="0.5" max="3" step="0.01" value="1" class="slider"/>

    <label>Rotate</label>
    <input type="range" id="rotate" min="-45" max="45" step="1" value="0" class="slider"/>

    <button id="resetBtn">Reset</button>
    <button id="previewBtn">Preview</button>
  </div>
</div>

<!-- SCREEN 3 -->
<div id="previewScreen" class="container">
  <h3>Preview</h3>
  <canvas id="finalCanvas"></canvas>

  <button id="downloadBtn">Download PNG</button>
  <button id="backBtn">Edit Again</button>
</div>

<script>
let stage, layer, userImageNode, templateImageNode;
let uploadedImage = null;
let userName = "";

const uploadScreen = document.getElementById("uploadScreen");
const editor = document.getElementById("editor");
const previewScreen = document.getElementById("previewScreen");

const nameInput = document.getElementById("nameInput");
const imageUpload = document.getElementById("imageUpload");
const continueBtn = document.getElementById("continueBtn");

nameInput.addEventListener("input", checkReady);
imageUpload.addEventListener("change", checkReady);

function checkReady() {
  continueBtn.disabled = !(nameInput.value && imageUpload.files.length);
}

continueBtn.onclick = function () {
  userName = nameInput.value;
  const file = imageUpload.files[0];
  const reader = new FileReader();

  reader.onload = function (e) {
    uploadedImage = e.target.result;
    startEditor();
  };

  reader.readAsDataURL(file);
};

// INIT EDITOR
function startEditor() {
  uploadScreen.style.display = "none";
  editor.style.display = "block";

  stage = new Konva.Stage({
    container: "canvasContainer",
    width: 350,
    height: 500
  });

  layer = new Konva.Layer();
  stage.add(layer);

  // User image
  const imageObj = new Image();
  imageObj.onload = function () {
    userImageNode = new Konva.Image({
      image: imageObj,
      x: 0,
      y: 0,
      draggable: true,
      width: stage.width(),
      height: stage.height()
    });

    layer.add(userImageNode);
    layer.draw();
  };
  imageObj.src = uploadedImage;

  // TEMPLATE OVERLAY (replace with your PNG)
  const template = new Image();
  template.onload = function () {
    templateImageNode = new Konva.Image({
      image: template,
      x: 0,
      y: 0,
      width: stage.width(),
      height: stage.height(),
      listening: false
    });

    layer.add(templateImageNode);
    layer.draw();
  };

  template.src = "https://via.placeholder.com/350x500.png?text=YOUR+TEMPLATE";
}

// ZOOM
document.getElementById("zoom").oninput = function () {
  if (userImageNode) {
    userImageNode.scale({
      x: this.value,
      y: this.value
    });
    layer.draw();
  }
};

// ROTATE
document.getElementById("rotate").oninput = function () {
  if (userImageNode) {
    userImageNode.rotation(this.value);
    layer.draw();
  }
};

// RESET
document.getElementById("resetBtn").onclick = function () {
  document.getElementById("zoom").value = 1;
  document.getElementById("rotate").value = 0;

  if (userImageNode) {
    userImageNode.scale({ x: 1, y: 1 });
    userImageNode.rotation(0);
    userImageNode.position({ x: 0, y: 0 });
    layer.draw();
  }
};

// PREVIEW
document.getElementById("previewBtn").onclick = function () {
  const dataURL = stage.toDataURL({ pixelRatio: 4 });

  uploadScreen.style.display = "none";
  editor.style.display = "none";
  previewScreen.style.display = "block";

  const img = new Image();
  img.src = dataURL;
  img.style.width = "100%";
  document.getElementById("previewScreen").prepend(img);
};

// DOWNLOAD HIGH RES (2000x2250)
document.getElementById("downloadBtn").onclick = function () {
  const scaleX = 2000 / stage.width();
  const scaleY = 2250 / stage.height();

  const uri = stage.toDataURL({
    width: 2000,
    height: 2250,
    pixelRatio: Math.max(scaleX, scaleY)
  });

  const link = document.createElement("a");
  link.download = userName + "_UPS2026.png";
  link.href = uri;
  link.click();
};

// BACK
document.getElementById("backBtn").onclick = function () {
  previewScreen.style.display = "none";
  editor.style.display = "block";
};
</script>

</body>
</html>
